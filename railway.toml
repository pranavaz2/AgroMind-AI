[project]
name = "AgroMind AI"

# ─────────────────────────────────────────────────────────
# Service 1: Node.js Orchestrator
# ─────────────────────────────────────────────────────────
[services.backend]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate"
startCommand = "npm run start"
watch = ["server/**"]
root = "server"

[services.backend.deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100

# ─────────────────────────────────────────────────────────
# Service 2: FastAPI Microservice
# ─────────────────────────────────────────────────────────
[services.ai]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"
startCommand = "gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --timeout 120"
watch = ["ai-service/**"]
root = "ai-service"

[services.ai.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
