services:
  - type: web
    name: agromind-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install && npx prisma generate
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: agromind-postgres
          property: connectionString
      - key: AI_SERVICE_URL
        value: https://agromind-ai-service.onrender.com
      - key: AI_PROVIDER
        value: python
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://agromind.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

  - type: web
    name: agromind-ai-service
    runtime: python
    rootDir: ai-service
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: AI_MODEL_PATH
        value: models/leaf_disease_model.keras
      - key: AI_CLASS_NAMES
        value: Healthy,Early Blight,Late Blight,Leaf Spot,Rust
      - key: IMAGE_SIZE
        value: 224
      - key: ENABLE_DEMO_FALLBACK
        value: true

databases:
  - name: agromind-postgres
    plan: starter
    databaseName: agromind_ai
    user: agromind
